server.servlet.context-path=/user
spring.application.name=Caching

#Database
spring.datasource.url=jdbc:postgresql://localhost:5432/user
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=database
spring.datasource.password=database
spring.jpa.hibernate.ddl-auto=update

#Cache
spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,metrics,prometheus

#Histograms habilitados para histogram_quantile no Grafana
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.hikaricp.connections.acquire=true
management.metrics.distribution.percentiles-histogram.lettuce=true
management.metrics.distribution.percentiles-histogram.spring.data.repository.invocations=true
management.metrics.distribution.percentiles-histogram.prevention.execution.timer=true

# Simulated DB latency to amplify stampede effect (ms). 0 = disabled.
app.db.simulated-latency-ms=2000

# Jitter strategy: random offset added to base TTL on save (seconds).
app.jitter.max-seconds=300

# SWR strategy: fresh window within base TTL (seconds).
app.swr.fresh-ttl-seconds=10
app.cache.base-ttl-minutes=10080
